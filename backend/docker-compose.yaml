services:
  mentor-matching:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mentor-matching
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      SERVER_CONTEXT_PATH: ${SERVER_CONTEXT_PATH:-/}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5173}
      APP_NAME: ${APP_NAME:-mentor-matching}
    restart: unless-stopped
