name: CI Frontend PR + Push

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-fe.yml"
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - ".github/workflows/ci-fe.yml"

concurrency:
  group: ci-fe-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Lint, Typecheck, Build (FE)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm install

      - name: Lint (ESLint + Prettier check)
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build
